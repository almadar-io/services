<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  
    <!-- Emitter -->
    <circle cx="200" cy="180" r="60" fill="#f1f5f9" stroke="#475569" stroke-width="4"/>
    <circle cx="200" cy="180" r="20" fill="#475569" filter="url(#glow)"/>
    
    <!-- Listener -->
    <circle cx="600" cy="180" r="60" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="4"/>
    <rect x="580" y="160" width="40" height="40" fill="#0ea5e9"/>
    
    <!-- Event Payload -->
    <path d="M260 180 L540 180" stroke="#475569" stroke-width="4" stroke-dasharray="15 10"/>
    <rect x="360" y="150" width="80" height="60" rx="8" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="3" filter="url(#glow)"/>
    <line x1="380" y1="170" x2="420" y2="170" stroke="#475569" stroke-width="4"/>
    <line x1="380" y1="190" x2="400" y2="190" stroke="#475569" stroke-width="4"/>
    <polygon points="520,170 540,180 520,190" fill="#475569"/>
  
</svg>