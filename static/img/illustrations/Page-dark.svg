<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <!-- Block 1 -->
    <g transform="translate(200, 380)">
      <polygon points="0,-40 60,-20 60,80 0,60" fill="#142a1c" stroke="#52b788" stroke-width="2" opacity="0.8"/>
      <polygon points="-60,-20 0,-40 0,60 -60,80" fill="#142a1c" stroke="#52b788" stroke-width="2" opacity="0.6"/>
      <polygon points="-60,-20 0,-40 60,-20 0,0" fill="#52b788" stroke="#52b788" stroke-width="2" opacity="0.3"/>
    </g>
    <!-- Block 2 -->
    <g transform="translate(400, 320)">
      <polygon points="0,-60 80,-30 80,120 0,90" fill="#142a1c" stroke="#95d5b2" stroke-width="2" opacity="0.9"/>
      <polygon points="-80,-30 0,-60 0,90 -80,120" fill="#142a1c" stroke="#95d5b2" stroke-width="2" opacity="0.7"/>
      <polygon points="-80,-30 0,-60 80,-30 0,0" fill="#95d5b2" stroke="#95d5b2" stroke-width="2" opacity="0.4"/>
      <polygon points="0,-40 20,-30 0,-20 -20,-30" fill="#95d5b2" filter="url(#glow)"/>
    </g>
    <!-- Block 3 -->
    <g transform="translate(600, 240)">
      <polygon points="0,-80 70,-40 70,160 0,120" fill="#142a1c" stroke="#52b788" stroke-width="2" opacity="0.9"/>
      <polygon points="-70,-40 0,-80 0,120 -70,160" fill="#142a1c" stroke="#52b788" stroke-width="2" opacity="0.8"/>
      <polygon points="-70,-40 0,-80 70,-40 0,0" fill="rgba(82, 183, 136, 0.2)" stroke="#52b788" stroke-width="2" opacity="0.5"/>
    </g>
  
</svg>