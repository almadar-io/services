<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  
    <!-- Brains -->
    <rect x="100" y="30" width="600" height="70" rx="12" fill="#f1f5f9" stroke="#475569" stroke-width="2" opacity="0.8"/>
    <circle cx="250" cy="65" r="20" fill="#475569" filter="url(#glow)"/>
    <circle cx="400" cy="65" r="20" fill="#475569"/>
    <circle cx="550" cy="65" r="20" fill="#475569"/>
    <line x1="270" y1="65" x2="380" y2="65" stroke="#475569" stroke-width="2"/>
    <line x1="420" y1="65" x2="530" y2="65" stroke="#475569" stroke-width="2"/>
    
    <!-- Metal -->
    <rect x="100" y="140" width="600" height="70" rx="4" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="2" opacity="0.9"/>
    <rect x="230" y="155" width="40" height="40" fill="#0ea5e9" filter="url(#glow)"/>
    <rect x="380" y="155" width="40" height="40" fill="#0ea5e9"/>
    <rect x="530" y="155" width="40" height="40" fill="#0ea5e9"/>
    
    <!-- Integrations -->
    <rect x="100" y="250" width="600" height="70" rx="35" fill="#f1f5f9" stroke="#475569" stroke-width="2" opacity="0.7"/>
    <polygon points="250,260 270,290 230,290" fill="#475569"/>
    <polygon points="350,260 370,290 330,290" fill="#475569"/>
    <polygon points="450,260 470,290 430,290" fill="#475569"/>
    <polygon points="550,260 570,290 530,290" fill="#475569"/>
    
    <!-- Cross Links -->
    <line x1="250" y1="100" x2="250" y2="140" stroke="#475569" stroke-width="3" stroke-dasharray="4"/>
    <line x1="400" y1="100" x2="400" y2="140" stroke="#475569" stroke-width="3" stroke-dasharray="4"/>
    <line x1="550" y1="100" x2="550" y2="140" stroke="#475569" stroke-width="3" stroke-dasharray="4"/>
    
    <line x1="250" y1="210" x2="250" y2="250" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="400" y1="210" x2="350" y2="250" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="400" y1="210" x2="450" y2="250" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="550" y1="210" x2="550" y2="250" stroke="#0ea5e9" stroke-width="3"/>
  
</svg>