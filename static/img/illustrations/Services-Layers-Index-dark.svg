<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <!-- Brains Layer (Top) -->
    <g transform="translate(400, 120)">
      <circle cx="0" cy="0" r="60" fill="#142a1c" stroke="#52b788" stroke-width="3" filter="url(#glow)"/>
      <circle cx="-15" cy="-10" r="8" fill="#95d5b2"/>
      <circle cx="15" cy="-10" r="8" fill="#52b788"/>
      <circle cx="0" cy="15" r="10" fill="#95d5b2"/>
      <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#52b788" stroke-width="1.5" opacity="0.6"/>
      <line x1="-15" y1="-10" x2="0" y2="15" stroke="#95d5b2" stroke-width="1.5" opacity="0.6"/>
      <line x1="15" y1="-10" x2="0" y2="15" stroke="#52b788" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Vertical connectors -->
    <line x1="400" y1="180" x2="400" y2="230" stroke="#52b788" stroke-width="3" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="340" y1="200" x2="340" y2="250" stroke="#95d5b2" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="460" y1="200" x2="460" y2="250" stroke="#95d5b2" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>

    <!-- Metal Layer (Middle) -->
    <g transform="translate(400, 300)">
      <rect x="-80" y="-40" width="160" height="80" rx="8" fill="#142a1c" stroke="#95d5b2" stroke-width="3"/>
      <rect x="-60" y="-25" width="40" height="20" rx="4" fill="#52b788" opacity="0.6"/>
      <rect x="-10" y="-25" width="40" height="20" rx="4" fill="#52b788" opacity="0.6"/>
      <rect x="30" y="-25" width="30" height="20" rx="4" fill="#95d5b2" opacity="0.6"/>
      <rect x="-60" y="5" width="50" height="20" rx="4" fill="#95d5b2" opacity="0.4"/>
      <rect x="0" y="5" width="60" height="20" rx="4" fill="#52b788" opacity="0.4"/>
    </g>

    <!-- Vertical connectors -->
    <line x1="400" y1="360" x2="400" y2="410" stroke="#52b788" stroke-width="3" stroke-dasharray="6 4" opacity="0.5"/>

    <!-- Integrations Layer (Bottom) -->
    <g transform="translate(400, 480)">
      <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="#142a1c" stroke="#52b788" stroke-width="3"/>
      <circle cx="0" cy="0" r="18" fill="#142a1c" stroke="#95d5b2" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#95d5b2" filter="url(#glow)"/>
      <!-- Radial spokes -->
      <line x1="0" y1="-50" x2="0" y2="-80" stroke="#52b788" stroke-width="2" opacity="0.4"/>
      <line x1="43" y1="-25" x2="70" y2="-40" stroke="#52b788" stroke-width="2" opacity="0.4"/>
      <line x1="43" y1="25" x2="70" y2="40" stroke="#52b788" stroke-width="2" opacity="0.4"/>
      <line x1="-43" y1="-25" x2="-70" y2="-40" stroke="#52b788" stroke-width="2" opacity="0.4"/>
      <line x1="-43" y1="25" x2="-70" y2="40" stroke="#52b788" stroke-width="2" opacity="0.4"/>
    </g>
  
</svg>