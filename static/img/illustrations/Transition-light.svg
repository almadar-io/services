<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <g transform="translate(400, 300)">
      <!-- Core Hub -->
      <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="#f1f5f9" stroke="#475569" stroke-width="5" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="30" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="3"/>
      <circle cx="0" cy="0" r="10" fill="#0ea5e9"/>

      <!-- Radial Spikes -->
      <g transform="rotate(0)"><line x1="0" y1="-80" x2="0" y2="-180" stroke="#475569" stroke-width="4" stroke-dasharray="10 5"/><rect x="-20" y="-220" width="40" height="40" rx="8" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="3"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-80" x2="0" y2="-180" stroke="#475569" stroke-width="4"/><circle cx="0" cy="-200" r="20" fill="#475569" opacity="0.8"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-80" x2="0" y2="-160" stroke="#475569" stroke-width="4" stroke-dasharray="10 5"/><polygon points="0,-200 20,-160 -20,-160" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="3"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-80" x2="0" y2="-180" stroke="#475569" stroke-width="4"/><rect x="-15" y="-210" width="30" height="30" rx="4" fill="#475569" opacity="0.7"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-80" x2="0" y2="-150" stroke="#475569" stroke-width="4" stroke-dasharray="5 5"/><circle cx="0" cy="-180" r="25" fill="#f1f5f9" stroke="#475569" stroke-width="2"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-80" x2="0" y2="-190" stroke="#475569" stroke-width="4"/><circle cx="0" cy="-210" r="15" fill="#0ea5e9" filter="url(#glow)"/></g>
    </g>
  
</svg>