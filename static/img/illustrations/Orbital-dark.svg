<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
      <rect width="600" height="600" fill="#0b1120" />
      <defs>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="16" result="blur" />
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
      <g font-family="sans-serif">
      <circle cx="300" cy="300" r="200" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.6" />
      <circle cx="100" cy="300" r="3" fill="#94a3b8" />
      <circle cx="500" cy="300" r="3" fill="#94a3b8" />
      <ellipse cx="300" cy="300" rx="200" ry="40" fill="none" stroke="#0ea5e9" stroke-width="0.8" transform="rotate(20 300 300)" />
      <circle cx="300" cy="300" r="2" fill="#fbbf24" />
    </g>
    </svg>