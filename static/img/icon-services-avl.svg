<?xml version="1.0" encoding="UTF-8"?>
<!-- Services AVL Icon: crossed trait rings (Brains/Metal) with /api and /events pages -->
<svg width="64" height="64" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="svcAvlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- Orbital boundary -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#svcAvlGrad)" stroke-width="2" />
  <circle cx="100" cy="100" r="70" fill="#4f46e5" opacity="0.03" />
  <text x="100" y="22" text-anchor="middle" fill="#4f46e5" font-size="11" font-weight="bold">Services</text>

  <!-- Trait: Brains (rotation -45) -->
  <g opacity="0.6" transform="rotate(-45,100,100)">
    <ellipse cx="100" cy="100" rx="50" ry="22" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 2" />
  </g>
  <!-- Trait: Metal (rotation 45) -->
  <g opacity="0.6" transform="rotate(45,100,100)">
    <ellipse cx="100" cy="100" rx="50" ry="22" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 2" />
  </g>

  <!-- Entity nucleus -->
  <circle cx="100" cy="100" r="18" fill="#4f46e5" opacity="0.15" />
  <circle cx="100" cy="100" r="18" fill="none" stroke="url(#svcAvlGrad)" stroke-width="2.5" />
  <!-- Field lines (5 fields) -->
  <line x1="100" y1="80" x2="100" y2="73" stroke="#4f46e5" stroke-width="1" opacity="0.6" />
  <line x1="117" y1="89" x2="122" y2="85" stroke="#4f46e5" stroke-width="1" opacity="0.6" />
  <line x1="117" y1="111" x2="122" y2="115" stroke="#4f46e5" stroke-width="1" opacity="0.6" />
  <line x1="100" y1="120" x2="100" y2="127" stroke="#4f46e5" stroke-width="1" opacity="0.6" />
  <line x1="83" y1="111" x2="78" y2="115" stroke="#4f46e5" stroke-width="1" opacity="0.6" />

  <!-- Page: /api -->
  <rect x="155" y="50" width="10" height="10" fill="#4f46e5" opacity="0.3" stroke="#4f46e5" stroke-width="1.5" />
  <text x="160" y="72" text-anchor="middle" fill="#4f46e5" font-size="8">/api</text>

  <!-- Page: /events -->
  <rect x="155" y="135" width="10" height="10" fill="#4f46e5" opacity="0.3" stroke="#4f46e5" stroke-width="1.5" />
  <text x="160" y="157" text-anchor="middle" fill="#4f46e5" font-size="8">/events</text>
</svg>
