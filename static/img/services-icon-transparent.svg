<?xml version="1.0" encoding="UTF-8"?>
<!-- G Orbital: 8 lobes (4 pairs at 45° spacing) -->
<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="servicesGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#95d5b2" />
            <stop offset="50%" stop-color="#52b788" />
            <stop offset="100%" stop-color="#2d6a4f" />
        </linearGradient>
    </defs>
    <!-- Pair 1: 0° -->
    <ellipse cx="50" cy="30" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
    <ellipse cx="50" cy="70" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
    <!-- Pair 2: 45° -->
    <g transform="rotate(45 50 50)">
        <ellipse cx="50" cy="30" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
        <ellipse cx="50" cy="70" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
    </g>
    <!-- Pair 3: 90° -->
    <g transform="rotate(90 50 50)">
        <ellipse cx="50" cy="30" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
        <ellipse cx="50" cy="70" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
    </g>
    <!-- Pair 4: 135° -->
    <g transform="rotate(135 50 50)">
        <ellipse cx="50" cy="30" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
        <ellipse cx="50" cy="70" rx="10" ry="16" fill="none" stroke="url(#servicesGrad)" stroke-width="2" />
    </g>
    <!-- Inner shells (concentric, lighter) -->
    <ellipse cx="50" cy="34" rx="6" ry="10" fill="none" stroke="url(#servicesGrad)" stroke-width="1.2" opacity="0.4" />
    <ellipse cx="50" cy="66" rx="6" ry="10" fill="none" stroke="url(#servicesGrad)" stroke-width="1.2" opacity="0.4" />
    <g transform="rotate(90 50 50)">
        <ellipse cx="50" cy="34" rx="6" ry="10" fill="none" stroke="url(#servicesGrad)" stroke-width="1.2" opacity="0.4" />
        <ellipse cx="50" cy="66" rx="6" ry="10" fill="none" stroke="url(#servicesGrad)" stroke-width="1.2" opacity="0.4" />
    </g>
    <!-- Center nucleus -->
    <circle cx="50" cy="50" r="3" fill="url(#servicesGrad)" />
</svg>
